name: Hyrox Frankfurt Monitor

on:
  schedule:
    # Alle 5 Minuten (Minimum bei GitHub Actions)
    - cron: '*/5 * * * *'
  workflow_dispatch: # Manueller Start jederzeit möglich

jobs:
  monitor:
    runs-on: ubuntu-22.04

    permissions:
      contents: write

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Monitor ausführen (alle 30 Sekunden für 4.5 Minuten)
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: |
          for i in {1..9}; do
            echo "--- Check $i/9 ---"
            python monitor.py
            if [ $i -lt 9 ]; then sleep 30; fi
          done

      - name: Hash-Datei committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_hash.txt
          git diff --staged --quiet || git commit -m "chore: update hash [skip ci]"
          git push
